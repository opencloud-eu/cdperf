services:
  db:
    image: mariadb:lts
    restart: always
    command: --transaction-isolation=READ-COMMITTED
    volumes:
      - db:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-INSECURE}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-INSECURE}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-nextcloud}
      MYSQL_USER: ${MYSQL_USER:-nextcloud}
  redis:
    image: redis:alpine
    restart: always

  nextcloud:
    image: nextcloud:32.0.5-apache
    restart: always
    ports:
      - 8080:80
    depends_on:
      - redis
      - db
    volumes:
      - nextcloud:/var/www/html
      - ./hooks/occ.sh:/docker-entrypoint-hooks.d/before-starting/99-occ.sh:ro
    environment:
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-INSECURE}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-nextcloud}
      MYSQL_USER: ${MYSQL_USER:-nextcloud}
      MYSQL_HOST: ${MYSQL_HOST:-db}
      NEXTCLOUD_ADMIN_USER: ${NEXTCLOUD_ADMIN_USER:-admin}
      NEXTCLOUD_ADMIN_PASSWORD: ${NEXTCLOUD_ADMIN_PASSWORD:-admin}
      NEXTCLOUD_TRUSTED_DOMAINS: ${NEXTCLOUD_TRUSTED_DOMAINS:-oc.home.arpa}
volumes:
  nextcloud:
  db:
